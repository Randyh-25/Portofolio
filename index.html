<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Saya</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@400;700&display=swap">
</head>
<body>
    <div id="landing-page">
        <div class="landing-text">
            <h1>Portofolio Randy Hendriyawan</h1>
            <button id="portfolio-button">Lihat Portofolio Saya</button>
        </div>
    </div>
    <div id="portfolio-page">
        <div class="container">
            <div class="left">
                <img src="path/to/your/photo.jpg" alt="Foto Saya" class="profile-photo">
            </div>
            <div class="right">
                <div class="tabs">
                    <button class="tab-link active" onclick="openTab(event, 'Tab1')">Tab 1</button>
                    <button class="tab-link" onclick="openTab(event, 'Tab2')">Tab 2</button>
                    <button class="tab-link" onclick="openTab(event, 'Tab3')">Tab 3</button>
                    <button class="tab-link" onclick="openTab(event, 'Tab4')">Tab 4</button>
                </div>
              <div id="Tab1" class="tab-content">
                  <h2>Data Diri</h2>
                  <p><strong>Nama Lengkap:</strong> Randy Hendriyawan</p>
                  <p><strong>Tempat, Tanggal Lahir:</strong> Medan, 25 Agustus 2004</p>
                  <p><strong>Email:</strong> <a href="mailto:randyhendriyawan@gmail.com">randyhendriyawan@gmail.com</a></p>
                  <p><strong>Media Sosial:</strong></p>
                  <div class="social-icons">
                      <a href="https://www.instagram.com/your_username" target="_blank" title="Instagram"><img src="path/to/instagram-icon.png" alt="Instagram"></a>
                      <a href="https://www.youtube.com/your_channel" target="_blank" title="YouTube"><img src="path/to/youtube-icon.png" alt="YouTube"></a>
                      <a href="https://twitter.com/your_username" target="_blank" title="Twitter"><img src="path/to/twitter-icon.png" alt="Twitter"></a>
                  </div>
              </div>

                <div id="Tab2" class="tab-content" style="display:none;">
                    <h2>Tab 2</h2>
                    <p>Konten untuk tab 2...</p>
                </div>
                <div id="Tab3" class="tab-content" style="display:none;">
                    <h2>Tab 3</h2>
                    <p>Konten untuk tab 3...</p>
                </div>
                <div id="Tab4" class="tab-content" style="display:none;">
                    <h2>Tab 4</h2>
                    <p>Konten untuk tab 4...</p>
                </div>
            </div>
        </div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
