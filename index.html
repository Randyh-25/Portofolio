<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mac OS Interface</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="desktop">
        <!-- Applications will be dynamically added here -->
    </div>
    <div id="dock-container">
        <div id="dock">
            <div class="dock-item" onclick="openApp('Finder')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c9/Finder_Icon_macOS_Big_Sur.png/800px-Finder_Icon_macOS_Big_Sur.png" alt="Finder">
            </div>
            <div class="dock-item" onclick="openApp('Safari')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/LinkedIn_logo_initials.png/640px-LinkedIn_logo_initials.png" alt="LinkedIn">
            </div>
            <div class="dock-item" onclick="openApp('Mail')">
                <img src="https://help.apple.com/assets/65A8108F6524DBD548085484/65A81090303713255A088515/en_US/e4dbb8e240d50cf30bab73b272a3760b.png" alt="Mail">
            </div>
            <!-- Add more dock items here -->
        </div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
